<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gran Día | Invitaciones Digitales</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@200;400;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --menta: #b7e4c7;
            --rosa: #ffcad4;
            --azul: #bee1e6;
            --texto: #4a4a4a;
            --fondo: #fbfdff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Pantalla de Bienvenida */
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 30px;
            animation: fadeInDown 1.2s ease-out;
        }

        .logo-main {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            color: #333;
        }

        .logo-sub {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #ff8fa3;
            margin-top: -10px;
        }

        .welcome-text {
            max-width: 600px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #666;
            font-weight: 300;
            animation: fadeInUp 1.5s ease-out;
        }

        .btn-entrar {
            padding: 18px 50px;
            background-color: white;
            color: #4a4a4a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            border: 2px solid var(--menta);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            animation: fadeIn 2s ease-in;
        }

        .btn-entrar:hover {
            background-color: var(--menta);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .logo-main { font-size: 2.2rem; }
            .logo-sub { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <div class="logo-container">
            <h1 class="logo-main">Mi Gran Día</h1>
            <div class="logo-sub">Invitaciones Digitales</div>
        </div>

        <p class="welcome-text">
            ¡Hazla espectacular! Adquiere tu video animado de forma <strong>individual</strong> o intégralo como un complemento premium a tu invitación web.
        </p>

        <a href="modelos.html" class="btn-entrar">Explorar Modelos</a>
    </div>

</body>
</html>
