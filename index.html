<style>
:root{
    --primario: #3e2c24;
    --guinda: #660000;
    --dorado-brillante: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    --dorado-solido: #c9a96a;
    --fondo: linear-gradient(135deg, #fdfbfb 0%, #f1e3d8 100%);
}

*{margin:0;padding:0;box-sizing:border-box; -webkit-user-select: none; user-select: none;}
img { -webkit-user-drag: none; pointer-events: none; }

body{font-family:'Poppins',sans-serif;background:var(--fondo);color:var(--primario);overflow-x:hidden;}

/* --- HEADER TRANSPARENTE CON SUPER LOGO (WEB) --- */
.header {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    padding: 15px 40px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(102, 0, 0, 0.1);
}

.brand-container {
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    max-width: 1400px; 
    margin: 0 auto;
    padding: 10px 0;
    border-top: 1.5px solid var(--guinda);
    border-bottom: 1.5px solid var(--guinda);
}

.logo-nombre-grupo {
    display: flex;
    align-items: center;
    gap: 30px;
}

.logo {
    height: 160px; /* Tamaño grande para Web */
    width: auto;
    border-right: 1.5px solid var(--guinda);
    padding-right: 30px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

.brand-text-wrapper {
    display: flex;
    flex-direction: column;
}

.brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    color: var(--primario);
    letter-spacing: 5px;
    text-transform: uppercase;
    font-weight: 700;
    line-height: 1;
}

.brand-slogan {
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    color: var(--dorado-solido);
    letter-spacing: 4px;
    margin-top: 8px;
    text-transform: uppercase;
}

.header-contact {
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--guinda);
    font-weight: 600;
    border: 1.5px solid var(--guinda);
    padding: 10px 25px;
    border-radius: 50px;
    text-decoration: none;
    transition: 0.3s;
}

/* HERO */
.hero{max-width:1400px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:100px 20px;gap:60px;}
.hero h1{font-family:'Playfair Display',serif; font-size:4.5rem; color: var(--guinda); line-height:1.1; margin-bottom:25px;}
.hero p{font-size:1.5rem;color:#6f5a4f;margin-bottom:45px;}

.btn{background:var(--dorado-brillante);background-size:200% auto;color:#3e2c24;padding:20px 55px;border-radius:50px;text-decoration:none;font-weight:700;box-shadow:0 10px 25px rgba(181, 146, 76, 0.25);transition:.4s;display:inline-block;cursor:pointer; border: none;}
.btn:hover{transform:translateY(-3px); background-position: right center;}

/* CELULARES */
.phones{position:relative;flex:1;display:flex;justify-content:center;}
.phone1{width:340px; transform:rotate(-5deg) translateX(45px); filter:drop-shadow(20px 30px 50px rgba(0,0,0,0.15));}
.phone2{width:340px; transform:rotate(5deg) translateX(-45px); filter:drop-shadow(-20px 30px 50px rgba(0,0,0,0.15));}

/* MODELOS CON INTERACCIÓN (MOVIMIENTO) */
.modelos{background:#fff;padding:100px 20px;text-align:center;border-radius:50px 50px 0 0;}
.grid{max-width:1400px;margin:auto;display:grid;grid-template-columns: repeat(4, 1fr); gap:30px;}

.card{
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 12px 25px rgba(0,0,0,0.06);
    border:1px solid #f1e3d8;
    padding-bottom:30px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
    transform: translateY(-18px);
    box-shadow: 0 25px 50px rgba(181, 146, 76, 0.2);
}

.card img{width:100%;height:330px;object-fit:cover;margin-bottom:25px;}
.card h3{font-family:'Playfair Display',serif;margin-bottom:18px; font-size: 2rem;}

.footer-message{padding:120px 20px;text-align:center;background:#fdfbfb;}
.footer-message h2{font-family:'Playfair Display',serif;font-size:3rem;font-style:italic;color:var(--primario);max-width:950px;margin:0 auto 35px;}

.whatsapp{position:fixed;bottom:35px;right:35px;background:#25D366;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);z-index:2000; transition: 0.3s;}
.whatsapp:hover { transform: scale(1.1); }

/* --- MODO CELULAR (CORREGIDO Y CENTRADO) --- */
@media(max-width:900px){
    .header { padding: 10px; }
    
    /* 👇 CENTRADO TOTAL DEL CONTENEDOR 👇 */
    .brand-container { 
        flex-direction: column; 
        align-items: center; /* Centra horizontalmente */
        justify-content: center; /* Centra verticalmente */
        border-top: 1.2px solid var(--guinda); 
        border-bottom: 1.2px solid var(--guinda); 
        gap: 10px; 
        padding: 15px 0;
    }
    
    /* 👇 CENTRADO DEL GRUPO INTERNO 👇 */
    .logo-nombre-grupo { 
        flex-direction: column; 
        align-items: center; /* Centra logo y textos */
        gap: 10px; 
    }
    
    /* 👇 LOGO MÁS GRANDE EN MÓVIL 👇 */
    .logo { 
        height: 120px; /* Aumentado drásticamente para que se vea */
        border: none; 
        padding: 0; 
        margin: 0;
    } 
    
    /* 👇 TEXTOS CENTRADOS Y MÁS GRANDES 👇 */
    .brand-text-wrapper {
        align-items: center; /* Centra el eslogan respecto al nombre */
        text-align: center; /* Centra el texto interno */
    }
    
    .brand-name { 
        font-size: 2.2rem; /* Nombre más grande */
        letter-spacing: 3px; 
        margin: 0;
    }
    
    .brand-slogan { 
        font-size: 1rem; /* Eslogan más grande y legible */
        letter-spacing: 3px; 
        margin-top: 5px; 
    }
    
    .header-contact { display: none; }
    
    .hero{flex-direction:column;text-align:center;padding:60px 20px;}
    .hero h1{font-size:3rem;}
    
    .phones { display: flex !important; flex-direction: row !important; justify-content: center; margin-top: 30px; }
    .phone1, .phone2 { width: 180px !important; display: block !important; transform: none !important; }
    
    .grid { grid-template-columns: 1fr; }
    .card img { height: 300px; }
    .card:hover { transform: translateY(-8px); }
}
</style>
</head>
