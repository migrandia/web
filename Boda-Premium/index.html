<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Premium | Mi Gran Día</title>

    <script>
        const CONFIG = {
            nombres: "Cecilia & Rubén",
            fecha_boda: "August 15, 2026 17:00:00", 
            whatsapp_contacto: "https://wa.me/525654252153",
            // Enlace de Dropbox actualizado con el parámetro directo
            musica_url: "https://www.dropbox.com/scl/fi/80hypdxkg24wx6x7oael2/En-Tus-Manos-Se-or.mp3?rlkey=j4di62c9sgj4txgwbpikcngp3&raw=1",
            foto_portada: "https://www.dropbox.com/scl/fi/pd9mjnnpuz1awyw4memr7/novios-de-frente.jpg?rlkey=fzbs6iftt0125yat387uxnbei&raw=1",
            foto_final: "https://www.dropbox.com/scl/fi/snutqjlkrv7oglqswicq2/novios-besandoce.jpg?rlkey=ad7z44z08wgr0f4wcd20et7nz&raw=1",
            maps_ceremonia: "https://maps.google.com", 
            maps_recepcion: "https://maps.google.com",
            regalos_url: "https://www.amazon.com.mx/"
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@200;400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-esmeralda: #064e3b;
            --dorado: #bca080;
            --blanco-suave: #fdfcf9;
            --ancho-max: 480px;
        }

        body { 
            -webkit-user-select: none; user-select: none;
            margin: 0; padding: 0; background-color: #1a1a1a; 
            font-family: 'Montserrat', sans-serif; text-align: center; color: var(--blanco-suave); 
        }

        .btn-regresar {
            position: fixed; top: 20px; left: 20px; z-index: 10000;
            background: rgba(6, 78, 59, 0.8); color: var(--dorado); padding: 10px 18px;
            border-radius: 5px; text-decoration: none; font-size: 0.7rem;
            font-weight: bold; letter-spacing: 2px; backdrop-filter: blur(5px);
            border: 1px solid var(--dorado); display: flex; align-items: center;
        }

        .main-wrapper { max-width: var(--ancho-max); margin: 0 auto; background-color: var(--verde-esmeralda); box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        .music-control {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            border: 2px solid var(--dorado);
        }

        .foto-premium { width: 100%; height: auto; display: block; }
        section { padding: 60px 25px; border-bottom: 1px solid rgba(188, 160, 128, 0.2); }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin: 10px 0; color: var(--dorado); }
        .conector { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--blanco-suave); display: block; margin: -20px 0; }
        
        .countdown-container { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        .time-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; min-width: 55px; border: 1px solid var(--dorado); }
        .time-box span { display: block; font-size: 1.2rem; font-weight: bold; }
        
        .info-card { background: rgba(255, 255, 255, 0.05); margin: 20px 0; padding: 30px 20px; border-radius: 20px; border: 1px solid var(--dorado); }
        .btn-premium { display: inline-block; margin-top: 20px; padding: 12px 25px; background: transparent; color: var(--dorado); text-decoration: none; border: 1px solid var(--dorado); font-size: 0.7rem; font-weight: bold; letter-spacing: 2px; }
        .btn-confirmar { display: inline-block; margin-top: 30px; padding: 18px 40px; background: var(--dorado); color: white; text-decoration: none; font-size: 0.8rem; font-weight: bold; border-radius: 50px; }
    </style>
</head>
<body oncontextmenu="return false;" onclick="autoPlayMusic()">

    <a href="javascript:history.back()" class="btn-regresar">VOLVER</a>

    <div class="music-control" onclick="toggleMusic(event)">
        <span id="music-icon">🎵</span>
        <audio id="bg-music" loop preload="auto">
            <source id="music-src" src="" type="audio/mpeg">
        </audio>
    </div>

    <div class="main-wrapper">
        <img id="portada" src="" class="foto-premium">

        <section>
            <span style="letter-spacing: 5px; font-size: 0.7rem;">ESTÁS INVITADO A LA BODA DE</span>
            <h1 id="nombre-novia">Cecilia</h1>
            <span class="conector">&</span>
            <h1 id="nombre-novio">Rubén</h1>
            
            <div class="countdown-container">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Hrs</label></div>
                <div class="time-box"><span id="mins">00</span><label>Min</label></div>
                <div class="time-box"><span id="secs">00</span><label>Seg</label></div>
            </div>
        </section>

        <section>
            <div class="info-card">
                <h2>Ceremonia</h2>
                <p>15 de Agosto, 2026 | 17:00 HRS</p>
                <a id="link-ceremonia" href="#" target="_blank" class="btn-premium">VER MAPA</a>
            </div>
            <div class="info-card">
                <h2>Recepción</h2>
                <p>19:30 HRS</p>
                <a id="link-recepcion" href="#" target="_blank" class="btn-premium">VER MAPA</a>
            </div>
        </section>

        <section>
            <h2>Mesa de Regalos</h2>
            <a id="link-regalos" href="#" target="_blank" class="btn-premium">VER MESA</a>
        </section>

        <img id="final" src="" class="foto-premium">

        <section>
            <h2>Confirmar Asistencia</h2>
            <a id="whatsapp" href="#" class="btn-confirmar">WHATSAPP</a>
        </section>
    </div>

    <script>
        // Cargar datos de imágenes y enlaces
        document.getElementById('portada').src = CONFIG.foto_portada;
        document.getElementById('final').src = CONFIG.foto_final;
        document.getElementById('whatsapp').href = CONFIG.whatsapp_contacto;
        document.getElementById('link-ceremonia').href = CONFIG.maps_ceremonia;
        document.getElementById('link-recepcion').href = CONFIG.maps_recepcion;
        document.getElementById('link-regalos').href = CONFIG.regalos_url;
        
        // Cargar música
        const music = document.getElementById('bg-music');
        const musicSrc = document.getElementById('music-src');
        const icon = document.getElementById('music-icon');
        musicSrc.src = CONFIG.musica_url;
        music.load();

        let hasStarted = false;

        // Función para iniciar música al primer toque en la pantalla
        function autoPlayMusic() {
            if (!hasStarted) {
                music.play().then(() => {
                    icon.innerText = "🔇";
                    hasStarted = true;
                }).catch(e => console.log("Interacción requerida para audio"));
            }
        }

        // Control manual del botón de música
        function toggleMusic(event) {
            event.stopPropagation();
            if (music.paused) {
                music.play();
                icon.innerText = "🔇";
                hasStarted = true;
            } else {
                music.pause();
                icon.innerText = "🎵";
            }
        }

        // Contador de tiempo
        const countdownDate = new Date(CONFIG.fecha_boda).getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            if (distance > 0) {
                document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
